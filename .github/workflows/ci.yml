name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build governed outputs
        run: |
          . .venv/bin/activate
          make all

      - name: Run validation gates
        run: |
          . .venv/bin/activate
          make validate

      - name: Run tests
        run: |
          . .venv/bin/activate
          make test

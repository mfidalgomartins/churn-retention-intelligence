version: 1
owner: analytics-engineering
scope: churn-retention-intelligence-system

datasets:
  raw_customers:
    path: data/raw/customers.csv
    grain: one_row_per_customer
    primary_key: customer_id
    required_columns:
      - customer_id
      - signup_date
      - segment
      - region
      - acquisition_channel
      - plan_type
  raw_subscriptions:
    path: data/raw/subscriptions.csv
    grain: one_row_per_customer_subscription
    primary_key: subscription_id
    required_columns:
      - subscription_id
      - customer_id
      - subscription_start_date
      - subscription_end_date
      - monthly_revenue
      - contract_type
      - billing_cycle
      - status
  processed_customer_features:
    path: data/processed/customer_retention_features.csv
    grain: one_row_per_customer_snapshot
    primary_key: customer_id
    required_columns:
      - customer_id
      - churn_flag
      - at_risk_flag
      - current_mrr
      - avg_monthly_revenue
      - usage_trend
      - support_tickets_90d
      - nps_score_recent
      - payment_failure_flag
  processed_risk_scores:
    path: data/processed/customer_risk_scores.csv
    grain: one_row_per_recoverable_customer
    primary_key: customer_id
    required_columns:
      - customer_id
      - churn_risk_score
      - revenue_risk_score
      - retention_priority_score
      - risk_tier
      - main_risk_driver
      - recommended_action

governance_rules:
  - all_primary_keys_unique
  - no_negative_revenue_values
  - churn_and_risk_flags_consistent_with_subscription_status
  - dashboard_must_consume_governed_processed_outputs
